<div class="posts-container" style="margin-bottom: 50px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
  <h1 style="font-size: 1.5rem !important; margin-bottom: 12px;">
    <a href="{{ site.github.url }}{{ post.url }}" style="text-decoration: none; color: #333;">{{ post.title }}</a>
  </h1>

  {% if post.image %}
    <div class="thumbnail-container" style="margin-bottom: 0px; line-height: 0;">
      <a href="{{ site.github.url }}{{ post.url }}">
        <img src="{{ site.github.url }}/assets/img/{{ post.image }}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; display: block;">
      </a>
    </div>
  {% endif %}

  <div class="period" style="font-size: 0.9rem; color: #777; margin-bottom: 8px;">
    {% if post.period %}
      <span class="period-text"><i class="fas fa-calendar-alt"></i> {{ post.period }}</span>
    {% endif %}
    {% if post.stack %}
      <span class="title-separator" style="margin: 0 8px;"> | </span>
      <span class="stack-icons">
        {% for tech in post.stack %}
          <img src="{{ site.github.url }}/assets/icons/{{ tech }}.svg" alt="{{ tech }}" style="width: 18px; height: 18px; vertical-align: middle; margin-right: 4px;">
        {% endfor %}
      </span>
    {% endif %}
  </div>

  <p class="post" style="
    font-size: 0.95rem; 
    line-height: 1.6; 
    color: #666; 
    margin-top: 5px;
    height: 11.2em;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 7;
    -webkit-box-orient: vertical;
    text-overflow: ellipsis;
    ">
        {{ post.summary | newline_to_br }}
    </p>
</div>
